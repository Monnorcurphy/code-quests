name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: pnpm install --frozen-lockfile || npm ci || true
      - name: Dependency audit
        run: pnpm audit --prod --audit-level=high || npm audit --audit-level=high || echo "Audit check (non-blocking)"
      - name: Lint
        run: pnpm lint || npm run lint || true
      - name: Typecheck
        run: pnpm typecheck || npm run typecheck || true
      - name: Test
        run: pnpm test || npm test || true
      - name: Build
        run: pnpm build || npm run build || true
